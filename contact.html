<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - IronFit Gym</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>IronFit Gym</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>
<main class="contact-container">
    <h2>Contact Us</h2>
    <p>Fill out the form and we’ll get back to you within 1 business day!</p>
    <form class="contact-form">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="text" placeholder="Subject" required>
        <textarea placeholder="Message" required></textarea>
        <button type="submit" class="button">Send Message</button>
    </form>
    <div class="contact-details">
        <p><strong>Phone:</strong> 123-456-7890<br>
        <strong>Email:</strong> info@ironfitgym.com<br>
        <strong>Location:</strong> 123 Fitness Ave, Your City</p>
    </div>
</main>
<footer>
    &copy; 2026 IronFit Gym
</footer>
</body>
</html>
